<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Ceiling Steps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo {
      width: 260px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background-color: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background-color 0.2s;
      min-width: 220px;
    }

    .card:hover {
      border-color: #aaa;
      background-color: #ebebeb;
    }

    .card img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
    }

    .card .value {
      font-size: 0.95rem;
      font-weight: 500;
      color: #222;
    }

    .email-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .email-icon svg {
      width: 36px;
      height: 36px;
      stroke: #555;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    footer {
      margin-top: 60px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>

  <img src="Images/logo.png" alt="Ceiling Steps logo" class="logo">
  <h1>Contact Us</h1>
  <p class="subtitle">Need support or want to share feedback? Reach out through either channel below.</p>

  <div class="cards">

    <a href="mailto:ceilingsteps@gmail.com" class="card">
      <div class="email-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </div>
      <span class="label">Email</span>
      <span class="value">ceilingsteps@gmail.com</span>
    </a>

    <a href="https://discord.gg/T4n5aqQCjF" target="_blank" rel="noopener noreferrer" class="card">
      <img src="Images/icon_ds.png" alt="Discord">
      <span class="label">Discord</span>
      <span class="value">Join our server</span>
    </a>

  </div>

  <footer>&copy; Ceiling Steps</footer>

</body>
</html>
